<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar | Eureka Labs</title>
    <link rel="icon" type="image/png" href="assets/img/logo.png">
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* === AUTH PAGE FIXES - ADICIONADOS AQUI PRA GARANTIR === */
        .auth-page-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 20px 80px 20px;
        }
        .auth-card { width: 100%; max-width: 440px; }
        .auth-card .card { padding: 2.5rem; }
        
        .auth-logo {
            width: 60px;
            height: 60px;
            display: block;
            margin: 0 auto 1.5rem auto;
            filter: drop-shadow(0 0 12px rgba(59, 130, 246, 0.4));
        }

        .form-group { margin-bottom: 1.2rem; }
        .form-group label {
            display: flex; align-items: center; gap: 8px;
            font-size: 0.9rem; font-weight: 500;
            color: var(--text-dim); margin-bottom: 0.6rem;
        }
        .form-input {
            width: 100%; padding: 14px 20px;
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 100px; color: var(--text-main);
            font-size: 1rem; outline: none; transition: var(--transition-smooth);
        }
        .form-input::placeholder { color: var(--text-dim); }
        .form-input:focus {
            border-color: var(--accent-blue);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.15);
        }
        .btn-block { width: 100%; }
        
        .auth-error, .reconnect-banner {
            display: none; align-items: center; gap: 8px;
            padding: 12px 16px; border-radius: 16px;
            font-size: 0.9rem; margin-bottom: 1.5rem;
        }
        .auth-error {
            background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
        }
        .auth-error.visible, .reconnect-banner.visible { display: flex; }
        .reconnect-banner {
            background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.3);
            color: var(--accent-blue);
        }

        .spinner {
            width: 18px; height: 18px; border: 2px solid rgba(0,0,0,0.2);
            border-top-color: #000; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader-container" id="pageLoader">
        <div class="loader-logo-wrap">
            <div class="loader-glow"></div>
            <img src="assets/img/logo.png" alt="Eureka Labs">
        </div>
        <p style="margin-top: 1.6rem; color: var(--text-dim); font-weight: 600;">Por favor aguarda...</p>
    </div>

    <header>
        <a href="index.html" class="logo-container">
            <img src="assets/img/logo.png" alt="Eureka Labs">
            <span class="logo-text brand-eureka">Eureka Labs</span>
        </a>
    </header>

    <main class="auth-page-wrap page-fade-in">
        <div class="auth-card">
            <div class="card">
                <img src="assets/img/logo.png" alt="Eureka Labs" class="auth-logo"/>
                <h1 style="text-align: center; margin-bottom: 0.4rem; font-size: 1.6rem; font-weight: 800;">Entrar</h1>
                <p style="text-align: center; color: var(--text-dim); font-size: 0.92rem; margin-bottom: 2rem;">
                    Continua a criar com o <span class="brand-idefy">Idefy</span>
                </p>

                <div class="reconnect-banner" id="reconnectBanner">
                    <div class="dot-spinner"></div>
                    <span id="reconnectText">A ligar ao servidor...</span>
                </div>

                <div id="loginError" class="auth-error">
                    <i data-lucide="alert-triangle" style="width:16px;height:16px; flex-shrink:0;"></i>
                    <span id="loginErrorText"></span>
                </div>

                <form id="loginForm" onsubmit="return false;">
                    <div class="form-group">
                        <label><i data-lucide="mail"></i> Email</label>
                        <input type="email" id="email" class="form-input" required placeholder="teu@email.com" autocomplete="email">
                    </div>

                    <div class="form-group">
                        <label><i data-lucide="lock"></i> Palavra-passe</label>
                        <input type="password" id="password" class="form-input" required placeholder="••••••••" autocomplete="current-password">
                    </div>

                    <button type="submit" class="btn btn-primary btn-block" style="margin-top: 0.5rem;">
                        <span id="loginBtnText">Entrar</span>
                    </button>
                </form>

                <div style="text-align: center; margin-top: 1.8rem; padding-top: 1.8rem; border-top: 1px solid var(--glass-border);">
                    <p style="color: var(--text-dim); font-size: 0.9rem;">
                        Sem conta? <a href="register.html" style="color: var(--accent-blue); text-decoration: none; font-weight: 600;">Regista-te</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-links">
            <a href="about.html"><i data-lucide="info"></i> Sobre</a>
            <a href="terms.html"><i data-lucide="file-text"></i> Termos</a>
            <a href="privacy.html"><i data-lucide="shield"></i> Privacidade</a>
            <a href="help.html"><i data-lucide="help-circle"></i> Ajuda</a>
        </div>
        <p class="footer-copy">© 2026 Eureka Labs — Todos os direitos reservados</p>
    </footer>

    <script src="assets/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            hideReconnect();
            if (typeof lucide !== 'undefined') lucide.createIcons();

            // Se já estiver logado, manda pra home
            if (typeof isLoggedIn === 'function' && isLoggedIn()) {
                window.location.href = postLoginRedirect();
            }
        });

        function showLoginError(msg) {
            document.getElementById('loginErrorText').textContent = msg;
            document.getElementById('loginError').classList.add('visible');
        }

        function showReconnect(msg) {
            document.getElementById('reconnectBanner').classList.add('visible');
            document.getElementById('reconnectText').textContent = msg;
        }
        function hideReconnect() {
            document.getElementById('reconnectBanner').classList.remove('visible');
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = e.target.querySelector('button[type="submit"]');
            const btnText = document.getElementById('loginBtnText');
            btn.disabled = true;
            btnText.innerHTML = '<span class="spinner"></span>';
            document.getElementById('loginError').classList.remove('visible');
            hideReconnect();
            document.getElementById('pageLoader').style.display = 'flex';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetchComRetry(
                    `${API_BASE_URL}/auth/login.php`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    },
                    showReconnect, // só aparece se falhar e tentar de novo
                    3
                );

                hideReconnect();
                const data = await response.json();

                if (response.ok && data.success && data.token) {
                    // GUARDA NO ARMAZENAMENTO
                    saveSession(data.token, data.user); 
                    
                    document.getElementById('pageLoader').style.display = 'none';
                    window.location.href = postLoginRedirect();
                    return;
                } else {
                    document.getElementById('pageLoader').style.display = 'none';
                    showLoginError(data.message || 'Email ou palavra-passe incorretos.');
                    btn.disabled = false;
                    btnText.textContent = 'Entrar';
                }
            } catch (error) {
                console.error(error);
                hideReconnect();
                document.getElementById('pageLoader').style.display = 'none';
                showLoginError('Não foi possível ligar ao servidor. Verifica a tua internet.');
                btn.disabled = false;
                btnText.textContent = 'Entrar';
            } finally {
                if (typeof lucide !== 'undefined') lucide.createIcons();
            }
        });
    </script>
</body>
</html>
