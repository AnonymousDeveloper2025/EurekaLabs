<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil | Eureka Labs Elite</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>
    <div id="particles-js"></div>
    <header>
        <a href="index.html" class="logo-container">
            <img src="https://anonymousdeveloper2025.github.io/EurekaLabs/e.png" alt="Eureka Labs Logo">
            <span class="logo-text">Eureka Labs</span>
        </a>
        <div id="menuToggle" style="cursor: pointer; color: white; padding: 10px;">
            <i data-lucide="menu"></i>
        </div>
    </header>

    <div class="overlay" id="overlay"></div>
    <nav class="side-menu" id="sideMenu">
        <div id="closeMenu" style="cursor:pointer; margin-bottom:2.5rem; text-align:right;"><i data-lucide="x"></i></div>
        <ul style="list-style:none;">
            <li style="margin-bottom:1.5rem;"><a href="index.html" style="color:white; text-decoration:none; display:flex; align-items:center; gap:12px; font-size:1.1rem;"><i data-lucide="home"></i> Início</a></li>
            <li style="margin-bottom:1.5rem;"><a href="inventory.html" style="color:white; text-decoration:none; display:flex; align-items:center; gap:12px; font-size:1.1rem;"><i data-lucide="package"></i> Inventário</a></li>
            <li style="margin-bottom:1.5rem;"><a href="categories.html" style="color:white; text-decoration:none; display:flex; align-items:center; gap:12px; font-size:1.1rem;"><i data-lucide="target"></i> Categorias</a></li>
            <li style="margin-bottom:1.5rem;"><a href="profile.html" style="color:white; text-decoration:none; display:flex; align-items:center; gap:12px; font-size:1.1rem;"><i data-lucide="user"></i> Perfil</a></li>
            <li style="margin-top:2rem; padding-top:2rem; border-top:1px solid var(--glass-border);"><a href="javascript:logout()" style="color:#ff6b6b; text-decoration:none; display:flex; align-items:center; gap:12px; font-size:1.1rem;"><i data-lucide="log-out"></i> Sair</a></li>
        </ul>
    </nav>

    <main class="container page-fade-in">
        <div style="max-width: 600px; margin: 0 auto;">
            <div class="card" style="text-align: center;">
                <div style="width: 100px; height: 100px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); border-radius: 50%; margin: 0 auto 2rem auto; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 800; color: white; box-shadow: 0 0 30px rgba(59, 130, 246, 0.3);">
                    <span id="userInitial">U</span>
                </div>
                
                <h1 id="userName" style="font-size: 2rem; margin-bottom: 0.5rem; font-weight: 700;">Utilizador</h1>
                <p id="userEmail" style="color: var(--text-dim); margin-bottom: 3rem;">email@exemplo.com</p>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 3rem;">
                    <div style="background: var(--glass); padding: 1.5rem; border-radius: 24px; border: 1px solid var(--glass-border);">
                        <h4 style="font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 0.5rem; letter-spacing: 1px;">Ideias</h4>
                        <span id="ideasCount" style="font-size: 1.8rem; font-weight: 800; color: white;">0</span>
                    </div>
                    <div style="background: var(--glass); padding: 1.5rem; border-radius: 24px; border: 1px solid var(--glass-border);">
                        <h4 style="font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 0.5rem; letter-spacing: 1px;">Plano</h4>
                        <span style="font-size: 1.4rem; font-weight: 800; color: #3b82f6;">ELITE</span>
                    </div>
                </div>

                <div style="display: flex; flex-direction: column; gap: 1rem;">
                    <a href="inventory.html" class="btn btn-primary" style="width: 100%;">Ver Meu Inventário</a>
                    <button onclick="logout()" class="btn btn-outline" style="width: 100%; color: #ff6b6b; border-color: rgba(255, 107, 107, 0.2);">Terminar Sessão</button>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('idefy_user'));
            if (user) {
                document.getElementById('userName').innerText = user.name;
                document.getElementById('userEmail').innerText = user.email;
                document.getElementById('userInitial').innerText = user.name.charAt(0).toUpperCase();
                
                // Fetch stats
                fetch(`${API_BASE_URL}/api/get-stats.php?userId=${user.id}`)
                    .then(r => r.json())
                    .then(data => {
                        if(data.success) {
                            document.getElementById('ideasCount').innerText = data.ideas_count || 0;
                        }
                    }).catch(() => {});
            }
            lucide.createIcons();
        });
    </script>
</body>
</html>
