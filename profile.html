<head>
    <meta charset="UTF-8">

</head>
<body>

        <div class="logo-container">
            <img src="https://anonymousdeveloper2025.github.io/EurekaLabs/e.png" alt="Eureka Labs Logo">
            <span class="logo-text">Idefy</span>
        </div>
        <div class="menu-btn">☰</div>
    </header>

    <div class="overlay"></div>

    <nav class="side-menu">
        <div class="close-menu">✕</div>
        <ul class="menu-links">
            <li><a href="index.html">🏠 Início</a></li>
            <li><a href="inventory.html">📦 Inventário</a></li>
            <li><a href="categories.html">🎯 Categorias</a></li>

            <li><a href="javascript:logout()">🚪 Sair</a></li>
        </ul>
    </nav>

    <main>
        <div class="container fade-in" style="max-width: 600px;">
            <div class="card">
                <h1 style="text-align: center; margin-bottom: 2rem;">👤 Meu Perfil</h1>

                <div style="background: #1f2937; padding: 1.5rem; border-radius: 10px; margin-bottom: 2rem;">
                    <div style="text-align: center; margin-bottom: 1.5rem;">
                        <div style="width: 80px; height: 80px; background: linear-gradient(to right, #3b82f6, #8b5cf6); border-radius: 50%; margin: 0 auto; display: flex; align-items: center; justify-content: center; font-size: 2rem;">
                            👤
                        </div>
                    </div>
                    <h2 id="userName" style="text-align: center; margin-bottom: 0.5rem;">Utilizador</h2>
                    <p id="userEmail" style="text-align: center; color: #9ca3af;">email@exemplo.com</p>
                </div>

                <div class="ad-container" id="ad-banner-profile">
                    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"></script>
                    <!-- Banner Publicitário -->
                    <ins class="adsbygoogle" style="display:inline-block;width:728px;height:90px" data-ad-client="ca-pub-xxxxxxxxxxxxxxxx" data-ad-slot="xxxxxxxx"></ins>
                    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
                </div>

                <div style="background: #1f2937; padding: 1.5rem; border-radius: 10px; margin-top: 2rem;">
                    <h3 style="margin-bottom: 1rem;">📊 Estatísticas</h3>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div style="background: #111827; padding: 1rem; border-radius: 8px; text-align: center;">
                            <p style="color: #9ca3af; font-size: 0.9rem;">Ideias Geradas</p>
                            <p id="ideasCount" style="font-size: 2rem; color: #3b82f6; font-weight: 800;">0</p>
                        </div>
                        <div style="background: #111827; padding: 1rem; border-radius: 8px; text-align: center;">
                            <p style="color: #9ca3af; font-size: 0.9rem;">PDFs Gerados</p>
                            <p id="pdfsCount" style="font-size: 2rem; color: #8b5cf6; font-weight: 800;">0</p>
                        </div>
                    </div>
                </div>

                <div style="margin-top: 2rem;">
                    <button class="btn btn-outline" onclick="changePassword()" style="width: 100%; margin-bottom: 1rem;">
                        🔐 Alterar Palavra-passe
                    </button>
                    <button class="btn btn-outline" onclick="deleteAccount()" style="width: 100%; color: #ff6b6b; border-color: #ff6b6b;">
                        🗑️ Eliminar Conta
                    </button>
                </div>
            </div>
        </div>
    </main>

        <footer>
        <div class="footer-separator"></div>
        <div class="footer-links">
            <a href="terms.html">Termos de Serviços</a>
            <a href="about.html">Sobre</a>
            <a href="privacy.html">Privacidade</a>
            <a href="help.html"><i class="fas fa-question-circle"></i> Ajuda</a>
        </div>
        <div style="margin-top: 1.5rem; display: flex; justify-content: center; gap: 20px;">
            <a href="#" style="color: var(--text-muted); transition: var(--transition);" onmouseover="this.style.color='#3b82f6'" onmouseout="this.style.color='var(--text-muted)'">
                <i class="fab fa-facebook-f"></i>
            </a>
            <a href="#" style="color: var(--text-muted); transition: var(--transition);" onmouseover="this.style.color='#3b82f6'" onmouseout="this.style.color='var(--text-muted)'">
                <i class="fab fa-twitter"></i>
            </a>
            <a href="#" style="color: var(--text-muted); transition: var(--transition);" onmouseover="this.style.color='#3b82f6'" onmouseout="this.style.color='var(--text-muted)'">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="#" style="color: var(--text-muted); transition: var(--transition);" onmouseover="this.style.color='#3b82f6'" onmouseout="this.style.color='var(--text-muted)'">
                <i class="fab fa-github"></i>
            </a>
        </div>
        <p style="color: #4b5563; font-size: 0.9rem; margin-top: 2rem;">© 2026 ∀nonymous Developer - Todos direitos reservados</p>
    </footer>

    <script>
        function loadProfile() {
            const user = JSON.parse(localStorage.getItem('idefy_user'));
            
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('userName').textContent = user.name || 'Utilizador';
            document.getElementById('userEmail').textContent = user.email || 'email@exemplo.com';

            // Load statistics
            fetch('https://eureka-labs-backend.onrender.com/api/get-stats.php?userId=' + user.id)
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById('ideasCount').textContent = data.ideas_count || 0;
                        document.getElementById('pdfsCount').textContent = data.pdfs_count || 0;
                    }
                })
                .catch(e => console.error('Erro ao carregar estatísticas:', e));
        }

        function changePassword() {
            const newPassword = prompt('Introduz a nova palavra-passe:');
            if (!newPassword) return;

            const user = JSON.parse(localStorage.getItem('idefy_user'));
            
            fetch('https://eureka-labs-backend.onrender.com/api/change-password.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: user.id, newPassword })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    alert('✅ Palavra-passe alterada com sucesso!');
                } else {
                    alert('❌ Erro ao alterar palavra-passe');
                }
            })
            .catch(e => console.error('Erro:', e));
        }

        function deleteAccount() {
            if (!confirm('Tens a certeza que queres eliminar a tua conta? Esta ação é irreversível!')) {
                return;
            }

            const user = JSON.parse(localStorage.getItem('idefy_user'));
            
            fetch('https://eureka-labs-backend.onrender.com/api/delete-account.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: user.id })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    alert('✅ Conta eliminada com sucesso');
                    localStorage.removeItem('idefy_user');
                    window.location.href = 'login.html';
                } else {
                    alert('❌ Erro ao eliminar conta');
                }
            })
            .catch(e => console.error('Erro:', e));
        }

        loadProfile();
    </script>

    <script src="assets/js/main.js"></script>
</body>
</html>
