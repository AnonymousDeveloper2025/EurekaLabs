<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado | Eureka Labs</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="particles-js"></div>

    <header>
        <a href="index.html" class="logo-container">
            <img src="https://anonymousdeveloper2025.github.io/EurekaLabs/e.png" alt="Eureka Labs Logo">
            <span class="logo-text">Eureka Labs</span>
        </a>
    </header>

    <main style="padding-top: 80px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem;">
        <div class="fade-in" style="width: 100%; max-width: 900px; text-align: center;">
            <div style="margin-bottom: 2rem;">
                <h1 style="font-size: 1.2rem; color: #3b82f6; font-weight: 600; margin-bottom: 0.5rem;">Eureka ✓</h1>
                <h2 style="font-size: 1.8rem; font-weight: 600;">Achamos a ideia perfeita para você</h2>
            </div>

            <div id="resultContainer" class="card" style="padding: 1rem; background: rgba(15, 18, 26, 0.8); overflow: hidden; text-align: left; min-height: 400px; border-radius: 32px;">
                <!-- O HTML gerado pela IA será injetado aqui -->
                <div style="padding: 4rem; text-align: center; color: var(--text-dim);">
                    <div class="loader-spinner" style="width: 40px; height: 40px; border: 3px solid rgba(59, 130, 246, 0.1); border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1rem auto;"></div>
                    A carregar a tua experiência...
                </div>
            </div>

            <div style="margin-top: 2rem; display: flex; gap: 15px; justify-content: center;">
                <a href="index.html" class="btn btn-outline">Nova Ideia</a>
                <button onclick="window.print()" class="btn btn-primary">Imprimir Plano</button>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const ideaData = JSON.parse(sessionStorage.getItem('last_generated_idea'));
            
            if (!ideaData) {
                window.location.href = 'index.html';
                return;
            }

            const container = document.getElementById('resultContainer');
            // Injetar o conteúdo HTML gerado pela IA
            container.innerHTML = ideaData.content;
            
            lucide.createIcons();
        });
    </script>
    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</body>
</html>
