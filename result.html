    <main>
        <div class="container fade-in" style="max-width: 700px;">

                <h1 style="text-align: center; margin-bottom: 2rem;">💡 Tua Ideia Gerada!</h1>

                <div class="result-box">

                <div class="ad-container" id="ad-banner-result">

                    <ins class="adsbygoogle" style="display:inline-block;width:728px;height:90px" data-ad-client="ca-pub-xxxxxxxxxxxxxxxx" data-ad-slot="xxxxxxxx"></ins>
                    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 2rem; flex-wrap: wrap;">
                    <button class="btn btn-primary" onclick="saveToInventory()">
                        💾 Guardar no Inventário
                    </button>
                    <button class="btn btn-outline" onclick="generatePDF()">
                        📄 Gerar PDF
                    </button>
                    <button class="btn btn-outline" onclick="window.location.href='categories.html'">
                        🔄 Nova Ideia
                    </button>
                </div>
            </div>
        </div>
    </main>

        <footer>

        </div>
        <div style="margin-top: 1.5rem; display: flex; justify-content: center; gap: 20px;">
            <a href="#" style="color: var(--text-muted); transition: var(--transition);" onmouseover="this.style.color='#3b82f6'" onmouseout="this.style.color='var(--text-muted)'">
                <i class="fab fa-facebook-f"></i>
            </a>
            <a href="#" style="color: var(--text-muted); transition: var(--transition);" onmouseover="this.style.color='#3b82f6'" onmouseout="this.style.color='var(--text-muted)'">

        <p style="color: #4b5563; font-size: 0.9rem; margin-top: 2rem;">© 2026 ∀nonymous Developer - Todos direitos reservados</p>
    </footer>

    <script>
        let generatedIdea = null;

        function displayIdea() {
            const ideaData = sessionStorage.getItem('generated_idea');
            
            if (!ideaData) {
                document.getElementById('ideaContent').textContent = 'Erro: Nenhuma ideia foi gerada';
                return;
            }

            generatedIdea = JSON.parse(ideaData);
            document.getElementById('ideaTitle').textContent = generatedIdea.title || 'Tua Ideia';
            document.getElementById('ideaContent').textContent = generatedIdea.content || 'Conteúdo não disponível';
        }

        async function saveToInventory() {
            const user = JSON.parse(localStorage.getItem('idefy_user'));
            
            if (!user) {
                alert('Erro: Utilizador não autenticado');
                return;
            }

            try {
                const response = await fetch('https://eureka-labs-backend.onrender.com/api/save-idea.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: user.id,
                        idea: generatedIdea
                    })
                });

                const data = await response.json();

                if (data.success) {
                    alert('✅ Ideia guardada com sucesso!');
                } else {
                    alert(data.message || 'Erro ao guardar ideia');
                }
            } catch (error) {
                console.error('Erro:', error);
                alert('Erro ao conectar com o servidor');
            }
        }

        async function generatePDF() {
            const user = JSON.parse(localStorage.getItem('idefy_user'));
            
            if (!user) {
                alert('Erro: Utilizador não autenticado');
                return;
            }

            try {
                const response = await fetch('https://eureka-labs-backend.onrender.com/api/generate-pdf.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: user.id,
                        idea: generatedIdea
                    })
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `ideia-${Date.now()}.pdf`;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    document.body.removeChild(a);
                } else {
                    alert('Erro ao gerar PDF');
                }
            } catch (error) {
                console.error('Erro:', error);
                alert('Erro ao conectar com o servidor');
            }
        }

        displayIdea();
    </script>

    <script src="assets/js/main.js"></script>
</body>
</html>
