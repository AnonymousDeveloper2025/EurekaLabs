<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventário | Eureka Labs Elite</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>
    <div id="particles-js"></div>
    <header>
        <a href="index.html" class="logo-container">
            <img src="https://anonymousdeveloper2025.github.io/EurekaLabs/e.png" alt="Eureka Labs Logo">
            <span class="logo-text">Eureka Labs</span>
        </a>
        <div id="menuToggle" style="cursor: pointer; color: white; padding: 10px;">
            <i data-lucide="menu"></i>
        </div>
    </header>

    <div class="overlay" id="overlay"></div>
    <nav class="side-menu" id="sideMenu">
        <div id="closeMenu" style="cursor:pointer; margin-bottom:2.5rem; text-align:right;"><i data-lucide="x"></i></div>
        <ul style="list-style:none;">
            <li style="margin-bottom:1.5rem;"><a href="index.html" style="color:white; text-decoration:none; display:flex; align-items:center; gap:12px; font-size:1.1rem;"><i data-lucide="home"></i> Início</a></li>
            <li style="margin-bottom:1.5rem;"><a href="inventory.html" style="color:white; text-decoration:none; display:flex; align-items:center; gap:12px; font-size:1.1rem;"><i data-lucide="package"></i> Inventário</a></li>
            <li style="margin-bottom:1.5rem;"><a href="categories.html" style="color:white; text-decoration:none; display:flex; align-items:center; gap:12px; font-size:1.1rem;"><i data-lucide="target"></i> Categorias</a></li>
            <li style="margin-bottom:1.5rem;"><a href="profile.html" style="color:white; text-decoration:none; display:flex; align-items:center; gap:12px; font-size:1.1rem;"><i data-lucide="user"></i> Perfil</a></li>
            <li style="margin-top:2rem; padding-top:2rem; border-top:1px solid var(--glass-border);"><a href="javascript:logout()" style="color:#ff6b6b; text-decoration:none; display:flex; align-items:center; gap:12px; font-size:1.1rem;"><i data-lucide="log-out"></i> Sair</a></li>
        </ul>
    </nav>

    <main class="container page-fade-in">
        <div style="text-align: center; margin-bottom: 4rem;">
            <h1 style="font-size: 3rem; font-weight: 800; margin-bottom: 1rem; letter-spacing: -1.5px;">Meu Inventário</h1>
            <p style="color: var(--text-dim); font-size: 1.15rem;">Todas as tuas experiências Eureka guardadas num só lugar.</p>
        </div>

        <div id="inventoryList" class="categories-grid">
            <!-- As ideias serão injetadas aqui -->
            <div style="grid-column: 1 / -1; text-align: center; padding: 5rem;">
                <div class="loader-spinner" style="width: 40px; height: 40px; border: 3px solid rgba(59, 130, 246, 0.1); border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1.5rem auto;"></div>
                <p style="color: var(--text-dim);">A sincronizar as tuas ideias...</p>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        async function loadInventory() {
            const user = JSON.parse(localStorage.getItem('idefy_user'));
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/api/get-inventory.php?userId=${user.id}`);
                const data = await response.json();

                const list = document.getElementById('inventoryList');
                if (data.success && data.inventory && data.inventory.length > 0) {
                    list.innerHTML = '';
                    data.inventory.forEach(idea => {
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.style.padding = '2rem';
                        card.style.display = 'flex';
                        card.style.flexDirection = 'column';
                        card.style.justifyContent = 'space-between';
                        card.style.minHeight = '250px';
                        card.style.borderRadius = '28px';
                        
                        card.innerHTML = `
                            <div>
                                <span style="background: rgba(59, 130, 246, 0.1); color: #3b82f6; padding: 5px 12px; border-radius: 100px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">${idea.category}</span>
                                <h3 style="margin-top: 1rem; font-size: 1.3rem; font-weight: 700;">${idea.title}</h3>
                                <p style="color: var(--text-dim); font-size: 0.85rem; margin-top: 0.5rem;">📅 ${new Date(idea.created_at).toLocaleDateString('pt-PT')}</p>
                            </div>
                            <button onclick='viewIdea(${JSON.stringify(idea).replace(/'/g, "&apos;")})' class="btn btn-primary" style="width: 100%; margin-top: 2rem; padding: 12px;">Abrir Ideia</button>
                        `;
                        list.appendChild(card);
                    });
                    gsap.from('.card', { opacity: 0, y: 20, stagger: 0.1, duration: 0.8 });
                } else {
                    list.innerHTML = `
                        <div style="grid-column: 1 / -1; text-align: center; padding: 5rem;">
                            <p style="color: var(--text-dim); font-size: 1.2rem;">Ainda não tens ideias guardadas.</p>
                            <a href="index.html" class="btn btn-primary" style="margin-top: 2rem;">Gerar a Primeira Ideia</a>
                        </div>
                    `;
                }
            } catch (e) {
                document.getElementById('inventoryList').innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 5rem; color: #ff6b6b;">
                        <i data-lucide="alert-circle" style="width: 48px; height: 48px; margin-bottom: 1rem;"></i>
                        <p>Erro ao conectar com o servidor. Tenta novamente.</p>
                    </div>
                `;
                lucide.createIcons();
            }
        }

        function viewIdea(idea) {
            sessionStorage.setItem('last_generated_idea', JSON.stringify(idea));
            window.location.href = 'result.html';
        }

        loadInventory();
        lucide.createIcons();
    </script>
</body>
</html>
