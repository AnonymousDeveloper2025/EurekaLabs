<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eureka Labs | Elite IA Assistant</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>
    <div id="particles-js"></div>

    <header>
        <a href="index.html" class="logo-container">
            <img src="https://anonymousdeveloper2025.github.io/EurekaLabs/e.png" alt="Eureka Labs Logo">
            <span class="logo-text">Eureka Labs</span>
        </a>
        <div style="display: flex; gap: 15px; align-items: center;">
            <a href="login.html" class="btn btn-outline" style="padding: 10px 20px; font-size: 0.85rem;">Entrar</a>
            <a href="register.html" class="btn btn-primary" style="padding: 10px 25px; font-size: 0.85rem;">Começar</a>
        </div>
    </header>

    <main class="container page-fade-in" style="text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh;">
        <div style="max-width: 850px; width: 100%;">
            <div id="hero-content">
                <h1 id="hero-title" style="font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: 800; line-height: 1.1; margin-bottom: 1.5rem; letter-spacing: -2px;">
                    Em que posso ajudar, <span style="background: linear-gradient(135deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Eureka</span>?
                </h1>
                <p style="color: var(--text-dim); font-size: 1.25rem; margin-bottom: 3.5rem; max-width: 600px; margin-left: auto; margin-right: auto;">Transformamos o teu tempo livre em experiências memoráveis com o nosso assistente IDEFY.</p>
            </div>

            <form id="searchForm" class="pill-input-container">
                <input type="text" id="topicInput" class="pill-input" placeholder="Peça ao Idefy... (ex: Plano de férias em Portugal)" autocomplete="off">
                <button type="submit" style="background: var(--accent-blue); border: none; color: white; cursor: pointer; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: var(--transition-smooth);">
                    <i data-lucide="arrow-up" style="width: 20px; height: 20px;"></i>
                </button>
            </form>

            <div style="display: flex; gap: 15px; justify-content: center; margin-top: 2rem;">
                <button type="button" class="btn btn-outline mode-btn active" onclick="setMode('simple', this)">
                    <i data-lucide="zap" style="width: 18px;"></i> Ideia Simples
                </button>
                <button type="button" class="btn btn-outline mode-btn" onclick="setMode('full', this)">
                    <i data-lucide="layout" style="width: 18px;"></i> Plano Completo
                </button>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-links">
            <a href="terms.html">Termos</a>
            <a href="about.html">Sobre</a>
            <a href="privacy.html">Privacidade</a>
            <a href="help.html">Ajuda</a>
        </div>
        <p style="font-size: 0.85rem; opacity: 0.5;">© 2026 ∀nonymous Developer — Eureka Labs Elite Version</p>
    </footer>

    <!-- Loader Profissional -->
    <div id="globalLoader" class="loader-container">
        <div class="loader-logo-wrap">
            <div class="loader-glow"></div>
            <img src="https://anonymousdeveloper2025.github.io/EurekaLabs/e.png" style="width: 80px; position: relative; z-index: 2; filter: drop-shadow(0 0 20px #3b82f6);">
        </div>
        <h2 id="loaderStatus" style="margin-top: 2.5rem; font-size: 1.3rem; font-weight: 500; letter-spacing: 1px; color: white;">O IDEFY ESTÁ A CRIAR...</h2>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        let currentMode = 'simple';

        function setMode(mode, btn) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active', 'btn-primary'));
            btn.classList.add('active');
            gsap.from(btn, { scale: 0.95, duration: 0.3, ease: "elastic.out(1, 0.3)" });
        }

        document.getElementById('searchForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const topic = document.getElementById('topicInput').value;
            if (!topic) return;

            sessionStorage.setItem('selected_topic', topic);
            sessionStorage.setItem('selected_mode', currentMode);
            
            gsap.to('main', { opacity: 0, y: -30, duration: 0.6, ease: "power4.in", onComplete: () => {
                window.location.href = 'categories.html';
            }});
        });

        // GSAP Hero Animation
        gsap.from('#hero-content', { opacity: 0, y: 40, duration: 1.2, ease: "power4.out" });
        gsap.from('.pill-input-container', { opacity: 0, y: 20, duration: 1, delay: 0.4, ease: "power4.out" });
        gsap.from('.mode-btn', { opacity: 0, y: 10, stagger: 0.1, delay: 0.7, duration: 0.8 });

        lucide.createIcons();
    </script>
    <style>
        .mode-btn.active {
            background: rgba(255,255,255,0.08);
            border-color: white;
            color: white;
        }
    </style>
</body>
</html>
