<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalizar | Eureka Labs</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>
    <div id="particles-js"></div>
    <header>
        <a href="index.html" class="logo-container">
            <img src="https://anonymousdeveloper2025.github.io/EurekaLabs/e.png" alt="Eureka Labs Logo">
            <span class="logo-text">Eureka Labs</span>
        </a>
    </header>

    <main class="container page-fade-in">
        <div style="max-width: 650px; margin: 0 auto;">
            <div class="card" id="questionCard">
                <div style="margin-bottom: 2rem;">
                    <div style="width: 100%; height: 4px; background: var(--glass-border); border-radius: 10px; overflow: hidden;">
                        <div id="progressBar" style="width: 0%; height: 100%; background: var(--accent-blue); transition: width 0.5s ease;"></div>
                    </div>
                </div>

                <p style="color: var(--accent-blue); font-weight: 600; font-size: 0.9rem; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 1px;">Assistente IDEFY</p>
                <h1 id="questionTitle" style="font-size: 1.8rem; font-weight: 700; margin-bottom: 2.5rem; line-height: 1.3;">A carregar perguntas...</h1>
                
                <div id="optionsList"></div>

                <div style="display: flex; justify-content: space-between; margin-top: 3rem; align-items: center;">
                    <button id="prevBtn" class="btn btn-outline" onclick="handlePrev()" style="visibility: hidden; padding: 12px 25px;">
                        <i data-lucide="arrow-left"></i>
                    </button>
                    
                    <button class="btn btn-outline" onclick="skipToGenerate()" style="font-size: 0.85rem; border-color: transparent;">
                        Pular e gerar agora
                    </button>

                    <button id="nextBtn" class="btn btn-primary" onclick="handleNext()" style="padding: 12px 30px;">
                        Próximo <i data-lucide="arrow-right"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Loader Profissional -->
    <div id="globalLoader" class="loader-container">
        <div class="loader-logo-wrap">
            <div class="loader-glow"></div>
            <img src="https://anonymousdeveloper2025.github.io/EurekaLabs/e.png" style="width: 80px; position: relative; z-index: 2; filter: drop-shadow(0 0 20px #3b82f6);">
        </div>
        <h2 id="loaderStatus" style="margin-top: 2.5rem; font-size: 1.3rem; font-weight: 500; color: white;">O IDEFY ESTÁ A CRIAR...</h2>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        // ✅ CONFIGURAÇÃO CORRECTA DA API
        const API_BASE_URL = 'https://eureka-labs-backend.onrender.com/backend/api';

        console.log('=== QUESTIONS.HTML INICIADO ===');
        console.log('API_BASE_URL:', API_BASE_URL);

        // Verificar autenticação
        const token = localStorage.getItem('authToken');
        console.log('Token presente:', !!token);
        
        if (!token) {
            alert('Não estás logado! Vai para o login.');
            window.location.href = 'login.html';
        }

        // Obter dados de sessionStorage COM FALLBACK
        let category = sessionStorage.getItem('selected_category') || 'geral';
        let topic = sessionStorage.getItem('selected_topic') || 'Uma ideia inovadora';
        let mode = sessionStorage.getItem('selected_mode') || 'simple';

        console.log('Categoria:', category);
        console.log('Tópico:', topic);
        console.log('Modo:', mode);
        
        let currentStep = 0;
        let answers = [];
        let questions = [];

        // Dicionário de perguntas POR CATEGORIA
        const categoryQuestions = {
            'geral': [
                { q: "Como te sentes inspirado?", options: ["Pela natureza", "Pela tecnologia", "Pela arte", "Pelas pessoas"] },
                { q: "Qual é o teu objetivo?", options: ["Aprender", "Criar", "Resolver", "Relaxar"] }
            ],
            'vida-pessoal': [
                { q: "Qual é o teu foco principal?", options: ["Organização", "Saúde Mental", "Produtividade", "Hobbies"] },
                { q: "Quanto tempo tens disponível?", options: ["15-30 min", "1-2 horas", "Meio dia", "Dia inteiro"] }
            ],
            'aventura': [
                { q: "Que tipo de ambiente preferes?", options: ["Natureza/Montanha", "Cidade/Urbano", "Praia/Mar", "Interior/Campo"] },
                { q: "Nível de adrenalina desejado?", options: ["Relaxante", "Moderado", "Intenso", "Extremo"] }
            ],
            'negocios': [
                { q: "Qual é o teu modelo de negócio?", options: ["B2B", "B2C", "SaaS", "E-commerce"] },
                { q: "Qual é o teu orçamento inicial?", options: ["Sem orçamento", "< €500", "€500-€5000", "> €5000"] }
            ],
            'tecnologia': [
                { q: "Qual é a tua stack preferida?", options: ["Frontend", "Backend", "Full Stack", "DevOps"] },
                { q: "Nível de experiência?", options: ["Iniciante", "Intermédio", "Avançado", "Expert"] }
            ]
        };

        function init() {
            console.log('=== INICIANDO ===');
            
            // Obter perguntas da categoria ou usar default
            questions = categoryQuestions[category] || categoryQuestions['geral'];
            
            console.log('Perguntas carregadas:', questions.length);
            console.log('Primeira pergunta:', questions[0]?.q);
            
            // Renderizar primeira pergunta
            renderQuestion();
            
            console.log('=== INIT COMPLETO ===');
        }

        function renderQuestion() {
            console.log('Renderizando pergunta:', currentStep + 1, 'de', questions.length);
            
            if (!questions[currentStep]) {
                console.error('Pergunta não encontrada no índice:', currentStep);
                return;
            }

            const q = questions[currentStep];
            
            // Actualizar título
            document.getElementById('questionTitle').innerText = q.q;
            
            // Actualizar progress bar
            const progress = ((currentStep + 1) / questions.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
            
            // Criar botões de opções
            const list = document.getElementById('optionsList');
            list.innerHTML = '';
            
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span>${opt}</span>`;
                btn.onclick = () => selectOption(opt, btn);
                
                // Marcar opção anterior se existir
                if(answers[currentStep] === opt) {
                    btn.classList.add('active');
                }
                
                list.appendChild(btn);
            });

            // Actualizar botões de navegação
            document.getElementById('prevBtn').style.visibility = currentStep > 0 ? 'visible' : 'hidden';
            
            const nextBtn = document.getElementById('nextBtn');
            if (currentStep === questions.length - 1) {
                nextBtn.innerHTML = 'Gerar Eureka <i data-lucide="zap"></i>';
            } else {
                nextBtn.innerHTML = 'Próximo <i data-lucide="arrow-right"></i>';
            }
            
            // Actualizar ícones do Lucide
            try {
                lucide.createIcons();
            } catch(e) {
                console.warn('Erro ao criar ícones:', e);
            }
            
            // Animação GSAP (com fallback se não houver GSAP)
            try {
                if (typeof gsap !== 'undefined') {
                    gsap.from('.option-btn', { 
                        opacity: 0, 
                        x: -20, 
                        stagger: 0.05, 
                        duration: 0.5 
                    });
                }
            } catch(e) {
                console.warn('GSAP não disponível');
            }
        }

        function selectOption(opt, btn) {
            answers[currentStep] = opt;
            document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            setTimeout(handleNext, 300);
        }

        function handleNext() {
            if(!answers[currentStep]) {
                alert('Por favor, selecciona uma opção');
                return;
            }
            
            if(currentStep < questions.length - 1) {
                currentStep++;
                renderQuestion();
            } else {
                startGeneration();
            }
        }

        function handlePrev() {
            if(currentStep > 0) {
                currentStep--;
                renderQuestion();
            }
        }

        function skipToGenerate() {
            startGeneration();
        }

        async function startGeneration() {
            document.getElementById('globalLoader').style.display = 'flex';
            
            try {
                console.log('Iniciando geração de ideia...');
                console.log('API URL:', API_BASE_URL);
                console.log('Dados:', {
                    topic: topic,
                    mode: mode,
                    category: category,
                    answers: answers
                });

                // ✅ CHAMADA CORRECTA À API
                const response = await fetch(`${API_BASE_URL}/generate-idea.php`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token  // ← OBRIGATÓRIO!
                    },
                    body: JSON.stringify({
                        topic: topic || category,
                        mode: mode,
                        category: category,
                        answers: answers
                    })
                });

                console.log('Response Status:', response.status);

                const data = await response.json();
                console.log('Response Data:', data);

                if(response.ok && data.success) {
                    console.log('Sucesso! Guardando ideia e redirecionando...');
                    sessionStorage.setItem('last_generated_idea', JSON.stringify(data.idea));
                    window.location.href = 'result.html';
                } else {
                    const errorMsg = data.message || 'Erro desconhecido ao gerar ideia.';
                    console.error('Erro na API:', errorMsg);
                    alert('❌ Erro: ' + errorMsg);
                    document.getElementById('globalLoader').style.display = 'none';
                }
            } catch (e) {
                console.error('Erro na requisição:', e);
                alert('❌ Erro ao conectar com o IDEFY: ' + e.message);
                document.getElementById('globalLoader').style.display = 'none';
            }
        }

        // ✅ Iniciar quando o DOM está pronto
        console.log('Aguardando DOM pronto...');
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
