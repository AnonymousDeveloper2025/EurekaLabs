<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registar-se - Eureka Labs Idefy</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <a href="index.html" class="logo-container">
            <img src="https://anonymousdeveloper2025.github.io/EurekaLabs/e.png" alt="Eureka Labs Logo">
            <span class="logo-text">Eureka Labs</span>
        </a>
    </header>

    <main style="display: flex; align-items: center; justify-content: center;">
        <div class="container" style="max-width: 450px;">
            <div class="card fade-in">
                <h1 style="text-align: center; margin-bottom: 2rem; font-size: 1.8rem;">🎉 Criar Conta</h1>

                <form id="registerForm">
                    <div class="form-group">
                        <label>👤 Nome Completo</label>
                        <input type="text" id="name" required placeholder="O teu nome">
                    </div>

                    <div class="form-group">
                        <label>📧 Email</label>
                        <input type="email" id="email" required placeholder="teu@email.com">
                    </div>

                    <div class="form-group">
                        <label>🔑 Palavra-passe</label>
                        <input type="password" id="password" required placeholder="••••••••">
                    </div>

                    <div class="form-group">
                        <label>✓ Confirmar Palavra-passe</label>
                        <input type="password" id="confirmPassword" required placeholder="••••••••">
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                        Registar-se
                    </button>
                </form>

                <div style="text-align: center; margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--pill-border);">
                    <p style="color: var(--text-dim);">Já tens conta? <a href="login.html" style="color: var(--accent-blue); text-decoration: none; font-weight: 600;">Entrar</a></p>
                </div>
            </div>
        </div>
    </main>

        <footer>
        <div class="footer-separator"></div>
        <div class="footer-links">
            <a href="terms.html">Termos de Serviços</a>
            <a href="about.html">Sobre</a>
            <a href="privacy.html">Privacidade</a>
            <a href="help.html"><i class="fas fa-question-circle"></i> Ajuda</a>
        </div>
        <div style="margin-top: 1.5rem; display: flex; justify-content: center; gap: 20px;">
            <a href="#" style="color: var(--text-muted); transition: var(--transition);" onmouseover="this.style.color='#3b82f6'" onmouseout="this.style.color='var(--text-muted)'">
                <i class="fab fa-facebook-f"></i>
            </a>
            <a href="#" style="color: var(--text-muted); transition: var(--transition);" onmouseover="this.style.color='#3b82f6'" onmouseout="this.style.color='var(--text-muted)'">
                <i class="fab fa-twitter"></i>
            </a>
            <a href="#" style="color: var(--text-muted); transition: var(--transition);" onmouseover="this.style.color='#3b82f6'" onmouseout="this.style.color='var(--text-muted)'">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="#" style="color: var(--text-muted); transition: var(--transition);" onmouseover="this.style.color='#3b82f6'" onmouseout="this.style.color='var(--text-muted)'">
                <i class="fab fa-github"></i>
            </a>
        </div>
        <p style="color: #4b5563; font-size: 0.9rem; margin-top: 2rem;">© 2026 ∀nonymous Developer - Todos direitos reservados</p>
    </footer>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<div class="loader-spinner" style="width: 20px; height: 20px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; margin: 0 auto;"></div>';

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                alert('⚠️ As palavras-passe não correspondem!');
                btn.disabled = false;
                btn.innerHTML = originalText;
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/register.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                if (!response.ok) throw new Error('Servidor indisponível');

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('idefy_user', JSON.stringify(data.user));
                    document.cookie = `idefy_token=${data.token}; path=/; max-age=31536000`;
                    window.location.href = 'categories.html';
                } else {
                    alert('❌ ' + (data.message || 'Erro ao registar'));
                }
            } catch (error) {
                console.error('Erro:', error);
                alert('⚠️ Erro ao conectar com o servidor. O Render pode estar a iniciar, tenta novamente em 30 segundos.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });
    </script>

    <script src="assets/js/main.js"></script>
</body>
</html>
