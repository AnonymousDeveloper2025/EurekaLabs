<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta | Eureka Labs</title>
    <link rel="icon" type="image/png" href="assets/img/logo.png">
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="loader-container" id="pageLoader">
        <div class="loader-logo-wrap">
            <div class="loader-glow"></div>
            <img src="assets/img/logo.png" alt="Eureka Labs">
        </div>
        <p style="margin-top: 1.6rem; color: var(--text-dim); font-weight: 600;">Por favor aguarda...</p>
    </div>

    <header>
        <a href="index.html" class="logo-container">
            <img src="assets/img/logo.png" alt="Eureka Labs">
            <span class="logo-text brand-eureka">Eureka Labs</span>
        </a>
    </header>

    <main class="auth-page-wrap page-fade-in">
        <div class="auth-card">
            <div class="card">
                <img src="assets/img/logo.png" alt="Eureka Labs" class="auth-hero-img">
                <h1 style="text-align: center; margin-bottom: 0.4rem; font-size: 1.6rem; font-weight: 800;">Criar Conta</h1>
                <p style="text-align: center; color: var(--text-dim); font-size: 0.92rem; margin-bottom: 2rem;">
                    Começa a criar com o <span class="brand-idefy">Idefy</span>
                </p>

                <div class="reconnect-banner" id="reconnectBanner">
                    <div class="dot-spinner"></div>
                    <span id="reconnectText">A ligar ao servidor...</span>
                </div>

                <div id="registerError" class="auth-error">
                    <i data-lucide="alert-triangle" style="width:16px;height:16px; flex-shrink:0;"></i>
                    <span id="registerErrorText"></span>
                </div>

                <form id="registerForm">
                    <div class="form-group">
                        <label><i data-lucide="user"></i> Nome completo</label>
                        <input type="text" id="name" class="form-input" required placeholder="O teu nome" autocomplete="name">
                    </div>

                    <div class="form-group">
                        <label><i data-lucide="mail"></i> Email</label>
                        <input type="email" id="email" class="form-input" required placeholder="teu@email.com" autocomplete="email">
                    </div>

                    <div class="form-group">
                        <label><i data-lucide="lock"></i> Palavra-passe</label>
                        <input type="password" id="password" class="form-input" required placeholder="Mínimo 6 caracteres" autocomplete="new-password" minlength="6">
                    </div>

                    <div class="form-group">
                        <label><i data-lucide="check-check"></i> Confirmar palavra-passe</label>
                        <input type="password" id="confirmPassword" class="form-input" required placeholder="Repete a palavra-passe" autocomplete="new-password">
                    </div>

                    <button type="submit" class="btn btn-primary btn-block" style="margin-top: 0.5rem;">
                        <span id="registerBtnText">Criar Conta</span>
                    </button>
                </form>

                <div style="text-align: center; margin-top: 1.8rem; padding-top: 1.8rem; border-top: 1px solid var(--glass-border);">
                    <p style="color: var(--text-dim); font-size: 0.9rem;">
                        Já tens conta? <a href="login.html" style="color: var(--accent-blue); text-decoration: none; font-weight: 600;">Entrar</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-links">
            <a href="about.html"><i data-lucide="info"></i> Sobre</a>
            <a href="terms.html"><i data-lucide="file-text"></i> Termos</a>
            <a href="privacy.html"><i data-lucide="shield"></i> Privacidade</a>
            <a href="help.html"><i data-lucide="help-circle"></i> Ajuda</a>
        </div>
        <p class="footer-copy">© 2026 Eureka Labs — Todos os direitos reservados</p>
    </footer>

    <script src="assets/js/main.js"></script>
    <script>
        function showRegisterError(msg) {
            document.getElementById('registerErrorText').textContent = msg;
            document.getElementById('registerError').classList.add('visible');
        }
        function showReconnect(msg) {
            document.getElementById('reconnectBanner').classList.add('visible');
            document.getElementById('reconnectText').textContent = msg;
        }
        function hideReconnect() {
            document.getElementById('reconnectBanner').classList.remove('visible');
        }

        if (isLoggedIn()) {
            window.location.href = postLoginRedirect();
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = e.target.querySelector('button[type="submit"]');
            const btnText = document.getElementById('registerBtnText');
            document.getElementById('registerError').classList.remove('visible');
            hideReconnect();

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                showRegisterError('As palavras-passe não coincidem.');
                return;
            }
            if (password.length < 6) {
                showRegisterError('A palavra-passe deve ter pelo menos 6 caracteres.');
                return;
            }

            btn.disabled = true;
            btnText.innerHTML = '<span class="spinner"></span>';
            document.getElementById('pageLoader').style.display = 'flex';

            try {
                const response = await fetchComRetry(
                    `${API_BASE_URL}/auth/register.php`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, email, password })
                    },
                    showReconnect,
                    3
                );

                hideReconnect();
                const data = await response.json();

                if (response.ok && data.success && data.token) {
                    saveSession(data.token, data.user);
                    // ✅ CORRIGIDO: antes voltava sempre para index.html.
                    window.location.href = postLoginRedirect();
                    return;
                } else {
                    document.getElementById('pageLoader').style.display = 'none';
                    showRegisterError(data.message || 'Não foi possível criar a conta.');
                    btn.disabled = false;
                    btnText.textContent = 'Criar Conta';
                }
            } catch (error) {
                hideReconnect();
                document.getElementById('pageLoader').style.display = 'none';
                showRegisterError('Não foi possível ligar ao servidor. Tenta novamente em instantes.');
                btn.disabled = false;
                btnText.textContent = 'Criar Conta';
            } finally {
                if (typeof lucide !== 'undefined') lucide.createIcons();
            }
        });
    </script>
</body>
</html>
